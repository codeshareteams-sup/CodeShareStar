# Render Blueprint Specification
# Deploy both the backend and frontend to Render with a single click.
# Learn more at: https://render.com/docs/blueprints

services:
  # ── Backend Web Service ─────────────────────────────────────────────────────
  - type: web
    name: codeshare-backend
    env: node
    plan: free
    rootDir: codeshare-backend
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: SUPABASE_URL
        sync: false
        description: "Your Supabase project URL (e.g., https://xxxx.supabase.co)"
      
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        description: "Your secret service_role key (bypasses RLS safely in backend)"

      - key: SUPABASE_ANON_KEY
        sync: false
        description: "Your public anon key (optional fallback)"

      - key: JWT_SECRET
        generateValue: true
        description: "Secret key for custom JWT authentication (automatically generated by Render)"

      - key: PORT
        value: 10000

  # ── Frontend Static Site ────────────────────────────────────────────────────
  - type: web
    name: codeshare-frontend
    env: static
    plan: free
    rootDir: codeshare-frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    envVars:
      - key: VITE_BACKEND_URL
        fromService:
          name: codeshare-backend
          type: web
          property: url
