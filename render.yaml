# Render Blueprint Specification (Unified Monolith Option 1)
# Deploy the entire stack as a single service on Render with a single click.
# Learn more at: https://render.com/docs/blueprints

services:
  # ── Unified Backend & Frontend Web Service ──────────────────────────────────
  - type: web
    name: codeshare-backend
    env: node
    plan: free
    rootDir: codeshare-backend
    
    # Builds the frontend React app and then installs backend node dependencies
    buildCommand: "cd ../codeshare-frontend && npm install && npm run build && cd ../codeshare-backend && npm install"
    
    startCommand: "node server.js"
    
    envVars:
      - key: SUPABASE_URL
        sync: false
        description: "Your Supabase project URL (e.g., https://xxxx.supabase.co)"
      
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
        description: "Your secret service_role key (bypasses RLS safely in backend)"

      - key: SUPABASE_ANON_KEY
        sync: false
        description: "Your public anon key (optional fallback)"

      - key: JWT_SECRET
        generateValue: true
        description: "Secret key for custom JWT authentication (automatically generated by Render)"

      - key: PORT
        value: 10000
